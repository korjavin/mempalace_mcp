services:
  mempalace-mcp:
    image: ghcr.io/korjavin/mempalace_mcp:89941948852063aa498bf415de1b7f0d8e053107
    restart: unless-stopped
    env_file: .env
    environment:
      - HOME=/app
      - PALACE_PATH=/data/palace
    volumes:
      - palace_data:/data/palace
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mempalace-mcp.rule=Host(`mempalace-mcp.example.com`)"
      - "traefik.http.routers.mempalace-mcp.entrypoints=websecure"
      - "traefik.http.routers.mempalace-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.mempalace-mcp.loadbalancer.server.port=8080"

volumes:
  palace_data:
